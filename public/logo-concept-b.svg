<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <!-- DAG ultra-bold -->
  <text x="0" y="44" font-size="44" font-weight="900" fill="#0f2244" font-family="'Arial Black', Arial, sans-serif" letter-spacing="6">DAG</text>
  <!-- Orange dot separator -->
  <circle cx="152" cy="26" r="4" fill="#f97316"/>
  <!-- AUTO light weight -->
  <text x="168" y="44" font-size="44" font-weight="300" fill="#0f2244" font-family="Arial, sans-serif" letter-spacing="6">AUTO</text>
  <!-- Full orange horizontal line -->
  <rect x="0" y="52" width="320" height="3" fill="#f97316"/>
  <!-- BUZĂU tagline below line -->
  <text x="0" y="66" font-size="8.5" fill="#f97316" font-family="Arial, sans-serif" letter-spacing="6">BUZĂU</text>
</svg>
