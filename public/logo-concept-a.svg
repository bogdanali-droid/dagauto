<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <!-- Background: full black rectangle, no rounding -->
  <rect width="240" height="64" fill="#111111" rx="0"/>

  <!-- Diamond (rhombus) 48x48 centered vertically at x=8, y=8 -->
  <!-- Diamond centered at (32, 32), half-width=24, half-height=24 -->
  <polygon points="32,8 56,32 32,56 8,32" fill="#D4A017"/>

  <!-- Letter D inside diamond -->
  <text x="32" y="41" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">D</text>

  <!-- DAG text -->
  <text x="68" y="28" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" letter-spacing="3">DAG</text>

  <!-- Thin gold horizontal line between DAG and AUTO -->
  <line x1="68" y1="35" x2="148" y2="35" stroke="#D4A017" stroke-width="1"/>

  <!-- AUTO text -->
  <text x="68" y="51" font-family="Arial Black, Arial, sans-serif" font-size="11" font-weight="400" fill="#D4A017" letter-spacing="6">AUTO</text>
</svg>
