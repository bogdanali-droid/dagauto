<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="DAG Auto logo">
  <title>DAG Auto</title>

  <!-- ═══════════════════════════════════════════
       ICON / EMBLEM — shield with stylized D
       White variant — for use on dark/navy backgrounds
       ═══════════════════════════════════════════ -->

  <!-- Shield outline (white fill) -->
  <path d="M4 6 L4 6 Q4 4 6 4 L42 4 Q44 4 44 6 L44 30 Q44 44 24 52 Q4 44 4 30 Z"
        fill="#ffffff"/>

  <!-- Stylized "D" letterform inside shield — navy so it reads on white shield -->
  <!-- Vertical stroke of D -->
  <rect x="11" y="13" width="5.5" height="26" rx="0.5" fill="#0f2244"/>

  <!-- D curve -->
  <path d="M16 13 L25 13 Q34 13 34 26 Q34 39 25 39 L16 39 L16 34 L24 34 Q28.5 34 28.5 26 Q28.5 18 24 18 L16 18 Z"
        fill="#0f2244"/>

  <!-- Speed chevron / motion accent — orange accent stays orange -->
  <path d="M29 30 L34.5 26 L29 22" stroke="#f97316" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ═══════════════════════════════════════════
       WORDMARK — DAG Auto (all white)
       ═══════════════════════════════════════════ -->

  <!-- "DAG" — bold, white -->
  <text x="55"
        y="30"
        font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
        font-size="22"
        font-weight="900"
        letter-spacing="1.5"
        fill="#ffffff"
        dominant-baseline="middle">DAG</text>

  <!-- "Auto" — medium weight, white -->
  <text x="108"
        y="30"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="19"
        font-weight="400"
        letter-spacing="0.5"
        fill="#ffffff"
        dominant-baseline="middle">Auto</text>

  <!-- Orange accent bar — stays orange on both variants -->
  <rect x="55" y="40" width="130" height="2.5" rx="1.25" fill="#f97316"/>

  <!-- Tagline — white, reduced opacity -->
  <text x="55"
        y="50"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="6.5"
        font-weight="400"
        letter-spacing="1.2"
        fill="#ffffff"
        opacity="0.7">MAȘINI DE CALITATE · BUZĂU</text>

</svg>
