<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <!-- Background: transparent -->

  <!-- Right-pointing chevron/arrow triangle, fill red -->
  <!-- Triangle: left-top=(4,8), left-bottom=(4,56), right-tip=(44,32) -->
  <polygon points="4,8 44,32 4,56" fill="#CC2200"/>

  <!-- Letter D bold white overlaid on triangle -->
  <text x="18" y="40" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">D</text>

  <!-- DAG text -->
  <text x="54" y="30" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#1A1A1A" letter-spacing="2">DAG</text>

  <!-- AUTO · BUZĂU text -->
  <text x="54" y="44" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#CC2200" letter-spacing="4">AUTO · BUZAU</text>

  <!-- Red bottom line 3px height, full width -->
  <rect x="0" y="60" width="240" height="3" fill="#CC2200"/>
</svg>
