<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none" role="img" aria-label="DAG Auto logo">
  <title>DAG Auto Buzău</title>

  <!-- ═══════════════════════════════════════════
       ICON MARK — Geometric D with speed stripe
       For dark/navy backgrounds
       ═══════════════════════════════════════════ -->

  <!-- D outer shape (white, fills left portion) -->
  <path
    fill-rule="evenodd"
    fill="#ffffff"
    d="
      M 4,4
      L 14,4
      C 34,4 40,12 40,26
      C 40,40 34,48 14,48
      L 4,48
      Z

      M 14,13
      L 14,39
      C 27,39 32,35 32,26
      C 32,17 27,13 14,13
      Z
    "
  />

  <!-- Orange diagonal speed stripe, clipped to D letterform only -->
  <defs>
    <clipPath id="logo-d-clip">
      <path
        fill-rule="evenodd"
        d="
          M 4,4 L 14,4
          C 34,4 40,12 40,26
          C 40,40 34,48 14,48
          L 4,48 Z
          M 14,13 L 14,39
          C 27,39 32,35 32,26
          C 32,17 27,13 14,13 Z
        "
      />
    </clipPath>
  </defs>

  <polygon
    points="20,4 40,4 16,48 0,48"
    fill="#f97316"
    clip-path="url(#logo-d-clip)"
  />

  <!-- ═══════════════════════════════════════════
       WORDMARK — bold DAG · orange AUTO
       ═══════════════════════════════════════════ -->

  <!-- Vertical orange separator line -->
  <rect x="50" y="8" width="2.5" height="36" rx="1" fill="#f97316" opacity="0.7"/>

  <!-- DAG — ultra bold, white, prominent -->
  <text x="61"
        y="36"
        font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="900"
        letter-spacing="2"
        fill="#ffffff">DAG</text>

  <!-- AUTO — orange, same bold weight, slightly smaller -->
  <text x="61"
        y="50"
        font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="700"
        letter-spacing="5"
        fill="#f97316">AUTO</text>

  <!-- Tagline — very subtle, wide tracking -->
  <text x="138"
        y="50"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="8"
        font-weight="400"
        letter-spacing="1"
        fill="#ffffff"
        opacity="0.4">BUZĂU</text>

</svg>
