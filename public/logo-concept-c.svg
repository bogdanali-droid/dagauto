<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <!-- Thin navy left accent line -->
  <rect x="0" y="8" width="3" height="55" fill="#0f2244"/>
  <!-- DAG large, bold, very spaced -->
  <text x="12" y="38" font-size="42" font-weight="900" fill="#0f2244" font-family="'Arial Black', Arial, sans-serif" letter-spacing="12">DAG</text>
  <!-- AUTO small, orange, wide tracking as elegant subtext -->
  <text x="14" y="60" font-size="16" font-weight="400" fill="#f97316" font-family="Arial, sans-serif" letter-spacing="22">AUTO</text>
</svg>
