<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Navy rounded-square background -->
  <rect width="64" height="64" rx="11" fill="#0f2244"/>

  <!--
    Bold geometric D letterform (even-odd for clean hole)
    Outer D: left bar + sweeping right curve
    Inner cutout: creates the counter-space
  -->
  <path
    fill-rule="evenodd"
    fill="#ffffff"
    d="
      M 9,9
      L 21,9
      C 48,9 55,18 55,32
      C 55,46 48,55 21,55
      L 9,55
      Z

      M 21,18
      L 21,46
      C 40,46 46,41 46,32
      C 46,23 40,18 21,18
      Z
    "
  />

  <!--
    Full-width diagonal orange speed stripe
    Clipped to the D glyph (filled area only via even-odd clip).
  -->
  <clipPath id="d-clip">
    <path
      fill-rule="evenodd"
      d="
        M 9,9 L 21,9
        C 48,9 55,18 55,32
        C 55,46 48,55 21,55
        L 9,55 Z
        M 21,18 L 21,46
        C 40,46 46,41 46,32
        C 46,23 40,18 21,18 Z
      "
    />
  </clipPath>

  <polygon
    points="26,9 55,9 22,55 0,55"
    fill="#f97316"
    clip-path="url(#d-clip)"
  />
</svg>
